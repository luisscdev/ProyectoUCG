<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0066FF;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0099FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00D4FF;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bgSquare" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#001F4D;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#000B1F;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="carGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E0F2FF;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Fondo cuadrado con esquinas redondeadas (estilo iOS/Android) -->
  <rect width="512" height="512" rx="110" ry="110" fill="url(#bgSquare)"/>

  <!-- Anillo tech decorativo -->
  <circle cx="256" cy="256" r="220" fill="none" stroke="url(#blueGrad)" stroke-width="2" opacity="0.3" stroke-dasharray="4,6"/>
  <circle cx="256" cy="256" r="200" fill="none" stroke="#00D4FF" stroke-width="1" opacity="0.2"/>

  <!-- Puntos de circuito -->
  <circle cx="256" cy="36" r="6" fill="#00D4FF" filter="url(#glow)"/>
  <circle cx="476" cy="256" r="6" fill="#00D4FF" filter="url(#glow)"/>
  <circle cx="256" cy="476" r="6" fill="#00D4FF" filter="url(#glow)"/>
  <circle cx="36" cy="256" r="6" fill="#00D4FF" filter="url(#glow)"/>

  <!-- LS grande centrado -->
  <text x="256" y="230" text-anchor="middle" font-family="'Arial Black', Arial, sans-serif"
        font-size="180" font-weight="900" fill="url(#blueGrad)" letter-spacing="-8" filter="url(#glow)">LS</text>

  <!-- Línea divisoria -->
  <line x1="156" y1="265" x2="356" y2="265" stroke="url(#blueGrad)" stroke-width="3"/>

  <!-- Carro estilizado debajo -->
  <g transform="translate(256, 330) scale(1.8)" filter="url(#glow)">
    <path d="M -55,5 Q -50,-15 -30,-18 L -10,-25 Q 0,-30 15,-28 L 35,-20 Q 50,-15 55,-5 L 58,8 Q 58,15 50,15 L -50,15 Q -58,15 -58,8 Z"
          fill="url(#carGrad)" stroke="#0099FF" stroke-width="1.5"/>
    <path d="M -28,-15 L -12,-22 Q 0,-26 12,-24 L 28,-17 L 25,-5 L -25,-5 Z"
          fill="#001F4D" opacity="0.9"/>
    <ellipse cx="50" cy="0" rx="5" ry="3" fill="#00D4FF"/>
    <circle cx="35" cy="15" r="9" fill="#001F4D" stroke="#00D4FF" stroke-width="1.5"/>
    <circle cx="35" cy="15" r="4" fill="#0099FF"/>
    <circle cx="-30" cy="15" r="9" fill="#001F4D" stroke="#00D4FF" stroke-width="1.5"/>
    <circle cx="-30" cy="15" r="4" fill="#0099FF"/>
  </g>

  <!-- Símbolo $ esquina -->
  <g transform="translate(400, 130)">
    <circle cx="0" cy="0" r="28" fill="#FFFFFF"/>
    <circle cx="0" cy="0" r="25" fill="none" stroke="url(#blueGrad)" stroke-width="3"/>
    <text x="0" y="10" text-anchor="middle" font-family="Arial, sans-serif"
          font-size="34" font-weight="bold" fill="#0066FF">$</text>
  </g>

  <!-- Texto AutoPredict pequeño abajo -->
  <text x="256" y="445" text-anchor="middle" font-family="Arial, sans-serif"
        font-size="32" font-weight="300" fill="#FFFFFF" letter-spacing="3">AutoPredict</text>
</svg>
