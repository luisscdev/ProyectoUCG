<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0066FF;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0099FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00D4FF;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="carGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E0F2FF;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#001F4D;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#000B1F;stop-opacity:1" />
    </radialGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="800" height="500" fill="#FAFCFF"/>

  <g transform="translate(180, 250)">
    <circle cx="0" cy="0" r="115" fill="url(#bgGrad)" />
    <circle cx="0" cy="0" r="115" fill="none" stroke="url(#blueGrad)" stroke-width="4" filter="url(#glow)"/>
    <circle cx="0" cy="0" r="100" fill="none" stroke="#00D4FF" stroke-width="1" stroke-dasharray="2,4" opacity="0.6"/>

    <circle cx="0" cy="-115" r="4" fill="#00D4FF" filter="url(#softGlow)"/>
    <circle cx="115" cy="0" r="4" fill="#00D4FF" filter="url(#softGlow)"/>
    <circle cx="0" cy="115" r="4" fill="#00D4FF" filter="url(#softGlow)"/>
    <circle cx="-115" cy="0" r="4" fill="#00D4FF" filter="url(#softGlow)"/>

    <g opacity="0.4">
      <polyline points="-70,40 -40,20 -10,30 20,-10 50,-20 75,-40"
                fill="none" stroke="#00D4FF" stroke-width="2" stroke-linecap="round"/>
      <circle cx="-70" cy="40" r="3" fill="#00D4FF"/>
      <circle cx="-40" cy="20" r="3" fill="#00D4FF"/>
      <circle cx="-10" cy="30" r="3" fill="#00D4FF"/>
      <circle cx="20" cy="-10" r="3" fill="#00D4FF"/>
      <circle cx="50" cy="-20" r="3" fill="#00D4FF"/>
      <circle cx="75" cy="-40" r="4" fill="#FFFFFF"/>
    </g>

    <g filter="url(#softGlow)">
      <path d="M -55,5 Q -50,-15 -30,-18 L -10,-25 Q 0,-30 15,-28 L 35,-20 Q 50,-15 55,-5 L 58,8 Q 58,15 50,15 L -50,15 Q -58,15 -58,8 Z"
            fill="url(#carGrad)" stroke="#0099FF" stroke-width="1.5"/>
      <path d="M -28,-15 L -12,-22 Q 0,-26 12,-24 L 28,-17 L 25,-5 L -25,-5 Z"
            fill="#001F4D" opacity="0.8"/>
      <line x1="-2" y1="-25" x2="-2" y2="-5" stroke="#0099FF" stroke-width="1"/>
      <ellipse cx="50" cy="0" rx="5" ry="3" fill="#00D4FF" filter="url(#glow)"/>
      <ellipse cx="-50" cy="0" rx="3" ry="2" fill="#FF3366" opacity="0.8"/>
      <circle cx="35" cy="15" r="9" fill="#001F4D" stroke="#00D4FF" stroke-width="1.5"/>
      <circle cx="35" cy="15" r="4" fill="#0099FF"/>
      <circle cx="35" cy="15" r="2" fill="#FFFFFF"/>
      <circle cx="-30" cy="15" r="9" fill="#001F4D" stroke="#00D4FF" stroke-width="1.5"/>
      <circle cx="-30" cy="15" r="4" fill="#0099FF"/>
      <circle cx="-30" cy="15" r="2" fill="#FFFFFF"/>
      <line x1="-40" y1="5" x2="40" y2="5" stroke="#00D4FF" stroke-width="0.5" opacity="0.6"/>
    </g>

    <g transform="translate(60, -60)">
      <circle cx="0" cy="0" r="16" fill="#FFFFFF" filter="url(#glow)"/>
      <circle cx="0" cy="0" r="14" fill="none" stroke="url(#blueGrad)" stroke-width="2"/>
      <text x="0" y="6" text-anchor="middle" font-family="Arial, sans-serif"
            font-size="20" font-weight="bold" fill="#0066FF">$</text>
    </g>

    <circle cx="-65" cy="-55" r="2" fill="#00D4FF" opacity="0.8"/>
    <circle cx="-75" cy="-45" r="1.5" fill="#FFFFFF" opacity="0.6"/>
    <circle cx="-60" cy="-45" r="1" fill="#00D4FF" opacity="0.7"/>
  </g>

  <g transform="translate(340, 215)">
    <text x="0" y="0" font-family="'Arial Black', Arial, sans-serif"
          font-size="78" font-weight="900" fill="url(#blueGrad)"
          letter-spacing="-2">LS</text>
    <line x1="0" y1="20" x2="350" y2="20" stroke="url(#blueGrad)" stroke-width="2"/>
    <text x="0" y="65" font-family="'Arial', sans-serif"
          font-size="42" font-weight="300" fill="#001F4D"
          letter-spacing="2">AutoPredict</text>
    <text x="0" y="95" font-family="'Arial', sans-serif"
          font-size="14" font-weight="400" fill="#0099FF"
          letter-spacing="4">AI &#183; DATA &#183; VEHICLE PRICING</text>
  </g>

  <g opacity="0.3">
    <line x1="20" y1="20" x2="60" y2="20" stroke="#0099FF" stroke-width="2"/>
    <line x1="20" y1="20" x2="20" y2="60" stroke="#0099FF" stroke-width="2"/>
    <line x1="780" y1="20" x2="740" y2="20" stroke="#0099FF" stroke-width="2"/>
    <line x1="780" y1="20" x2="780" y2="60" stroke="#0099FF" stroke-width="2"/>
    <line x1="20" y1="480" x2="60" y2="480" stroke="#0099FF" stroke-width="2"/>
    <line x1="20" y1="480" x2="20" y2="440" stroke="#0099FF" stroke-width="2"/>
    <line x1="780" y1="480" x2="740" y2="480" stroke="#0099FF" stroke-width="2"/>
    <line x1="780" y1="480" x2="780" y2="440" stroke="#0099FF" stroke-width="2"/>
  </g>
</svg>
